name: Release Package

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

concurrency:
  group: release-package-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-release:
    name: Build Release Package
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: python -m pip install uv

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build distributable package
        run: python scripts/package.py --installer uv --download-missing-python

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: mayauvsnapshotplus-release-package
          path: dist/mayauvsnapshotplus*.zip
          if-no-files-found: error

      - name: Extract release notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          tag="${GITHUB_REF_NAME}"
          awk -v tag="$tag" '
            $0 ~ "^## \\[" tag "\\]" { found=1; next }
            found && $0 ~ "^## \\[" { exit }
            found { print }
          ' CHANGELOG.md > release_notes.md
          test -s release_notes.md

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            dist/mayauvsnapshotplus*.zip \
            --title "$GITHUB_REF_NAME" \
            --notes-file release_notes.md
