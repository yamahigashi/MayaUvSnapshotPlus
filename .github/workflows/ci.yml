name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-compile:
    name: Python Compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Compile Python sources
        run: python -m compileall python scripts

  rust-test:
    name: Rust Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check Rust formatting
        run: cargo fmt --manifest-path rust/edge_drawer/Cargo.toml --check

      - name: Run Rust tests
        run: cargo test --manifest-path rust/edge_drawer/Cargo.toml

  package:
    name: Package Module
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install uv
        run: python -m pip install uv

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build distributable package
        run: python scripts/package.py --installer uv --download-missing-python

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: mayauvsnapshotplus-package
          path: dist/mayauvsnapshotplus.zip
          if-no-files-found: error
